<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawBot — PetNova AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <style>
        /* ── RESET & BASE ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:          #0d0820;
            --bg2:         #130f2b;
            --surface:     #1a1535;
            --surface2:    #231d42;
            --border:      rgba(130, 100, 255, 0.18);
            --accent:      #7c5cfc;
            --accent2:     #b06aff;
            --accent-glow: rgba(124, 92, 252, 0.35);
            --text:        #e8e0ff;
            --text-muted:  #8878bb;
            --text-dim:    #5a4e80;
            --user-bubble: linear-gradient(135deg, #7c5cfc 0%, #b06aff 100%);
            --bot-bubble:  #1e1840;
            --send-bg:     linear-gradient(135deg, #7c5cfc, #b06aff);
            --pill:        rgba(124, 92, 252, 0.12);
            --pill-border: rgba(124, 92, 252, 0.3);
            --font-head:   'Syne', sans-serif;
            --font-body:   'DM Sans', sans-serif;
        }
        

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            overflow: hidden;
        }

        /* ── ANIMATED BACKGROUND ── */
        .bg-canvas {
            position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(80px);
            animation: drift 18s ease-in-out infinite alternate;
        }
        .orb1 { width: 420px; height: 420px; background: rgba(124,92,252,.18); top: -80px; left: -60px; animation-delay: 0s; }
        .orb2 { width: 320px; height: 320px; background: rgba(176,106,255,.12); bottom: -40px; right: -40px; animation-delay: -6s; }
        .orb3 { width: 200px; height: 200px; background: rgba(92,200,252,.08); top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -12s; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, 20px) scale(1.08); }
        }

        /* floating paws */
        .paw-float {
            position: absolute; font-size: 1.4rem; opacity: 0.05;
            animation: floatUp 20s linear infinite;
            pointer-events: none;
        }
        @keyframes floatUp {
            from { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10%  { opacity: 0.07; }
            90%  { opacity: 0.07; }
            to   { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* ── LAYOUT ── */
        .app {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            height: 100vh; max-width: 820px;
            margin: 0 auto;
            padding: 0;
        }

        /* ── HEADER ── */
        .header {
            display: flex; align-items: center; gap: 14px;
            padding: 18px 24px 16px;
            border-bottom: 1px solid var(--border);
            background: rgba(13, 8, 32, 0.6);
            backdrop-filter: blur(20px);
            flex-shrink: 0;
        }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--text-muted); text-decoration: none;
            font-size: 0.82rem; font-family: var(--font-body);
            padding: 6px 12px; border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--pill);
            transition: all 0.2s ease;
            margin-right: 4px;
        }
        .back-btn:hover { color: var(--text); border-color: var(--accent); background: rgba(124,92,252,0.2); }
        .avatar-wrap {
            position: relative;
        }
        .avatar {
            width: 46px; height: 46px; border-radius: 50%;
            background: linear-gradient(135deg, #7c5cfc, #b06aff);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; flex-shrink: 0;
            box-shadow: 0 0 0 3px rgba(124,92,252,.25);
        }
        .status-dot {
            position: absolute; bottom: 2px; right: 2px;
            width: 10px; height: 10px; border-radius: 50%;
            background: #2dff98;
            border: 2px solid var(--bg);
            animation: pulse-dot 2.5s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,100% { box-shadow: 0 0 0 0 rgba(45,255,152,.4); }
            50%      { box-shadow: 0 0 0 5px rgba(45,255,152,0); }
        }
        .header-info { flex: 1; min-width: 0; }
        .header-name {
            font-family: var(--font-head); font-weight: 700; font-size: 1.05rem;
            color: var(--text); letter-spacing: -0.01em; line-height: 1.2;
        }
        .header-sub { font-size: 0.76rem; color: #2dff98; margin-top: 1px; }

        .header-actions { display: flex; gap: 8px; }
        .icon-btn {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--pill); border: 1px solid var(--border);
            color: var(--text-muted); font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.2s;
        }
        .icon-btn:hover { background: rgba(124,92,252,.2); color: var(--text); border-color: var(--accent); }

        /* ── MESSAGES AREA ── */
        .messages {
            flex: 1; overflow-y: auto; padding: 24px 20px 16px;
            display: flex; flex-direction: column; gap: 12px;
            scroll-behavior: smooth;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* date divider */
        .date-divider {
            display: flex; align-items: center; gap: 12px;
            color: var(--text-dim); font-size: 0.72rem; letter-spacing: 0.08em;
            text-transform: uppercase;
            margin: 8px 0;
        }
        .date-divider::before, .date-divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }

        /* message bubbles */
        .msg-row {
            display: flex; align-items: flex-end; gap: 10px;
            animation: popIn 0.22s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        @keyframes popIn {
            from { transform: scale(0.88) translateY(8px); opacity: 0; }
            to   { transform: scale(1) translateY(0); opacity: 1; }
        }
        .msg-row.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; flex-shrink: 0;
            background: linear-gradient(135deg, #7c5cfc, #b06aff);
        }
        .msg-row.user .msg-avatar {
            background: var(--surface2);
            font-size: 0.85rem;
        }

        .bubble {
            max-width: 72%; padding: 11px 15px;
            border-radius: 20px;
            font-size: 0.9rem; line-height: 1.6;
            word-break: break-word;
        }
        .bubble.bot {
            background: var(--bot-bubble);
            color: var(--text);
            border-bottom-left-radius: 5px;
            border: 1px solid var(--border);
        }
        .bubble.user {
            background: var(--user-bubble);
            color: #fff;
            border-bottom-right-radius: 5px;
        }
        .bubble strong { color: #c4b5fd; }
        .bubble.user strong { color: #f0e6ff; }

        /* timestamp */
        .msg-time {
            font-size: 0.68rem; color: var(--text-dim);
            margin-top: 3px; padding: 0 4px;
            align-self: flex-start;
        }
        .msg-row.user .msg-time { text-align: right; }
        .msg-col { display: flex; flex-direction: column; }
        .msg-row.user .msg-col { align-items: flex-end; }

        /* typing indicator */
        .typing-row { display: flex; align-items: flex-end; gap: 10px; }
        .typing-bubble {
            padding: 12px 16px; border-radius: 20px; border-bottom-left-radius: 5px;
            background: var(--bot-bubble); border: 1px solid var(--border);
            display: flex; gap: 5px; align-items: center;
        }
        .dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--accent); opacity: 0.6;
            animation: bounce 1.3s ease-in-out infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.18s; }
        .dot:nth-child(3) { animation-delay: 0.36s; }
        @keyframes bounce {
            0%,60%,100% { transform: translateY(0); opacity: 0.6; }
            30%          { transform: translateY(-6px); opacity: 1; }
        }

        /* ── QUICK REPLIES ── */
        .quick-section {
            padding: 8px 20px 4px;
            display: flex; flex-wrap: wrap; gap: 7px;
        }
        .quick-btn {
            background: var(--pill);
            border: 1px solid var(--pill-border);
            color: var(--text-muted);
            border-radius: 20px; padding: 6px 13px;
            font-size: 0.78rem; font-family: var(--font-body);
            cursor: pointer; transition: all 0.2s;
            white-space: nowrap;
        }
        .quick-btn:hover {
            background: rgba(124,92,252,.25);
            color: var(--text); border-color: var(--accent);
            transform: translateY(-1px);
        }

        /* ── INPUT AREA ── */
        .input-section {
            padding: 12px 16px 16px;
            background: rgba(13, 8, 32, 0.7);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }
        .input-wrap {
            display: flex; align-items: flex-end; gap: 10px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 24px;
            padding: 10px 10px 10px 18px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-wrap:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        #chat-input {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text); font-family: var(--font-body);
            font-size: 0.9rem; line-height: 1.5;
            resize: none; max-height: 120px; overflow-y: auto;
        }
        #chat-input::placeholder { color: var(--text-dim); }
        #send-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--send-bg);
            border: none; color: #fff; font-size: 1rem;
            cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            box-shadow: 0 4px 14px rgba(124,92,252,.4);
        }
        #send-btn:hover:not(:disabled) { transform: scale(1.1); box-shadow: 0 6px 20px rgba(124,92,252,.6); }
        #send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

        .input-footer {
            text-align: center; font-size: 0.68rem; color: var(--text-dim);
            margin-top: 8px;
        }
        .input-footer span { color: var(--accent); }

        /* ── EMPTY STATE ── */
        .empty-state {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            flex: 1; text-align: center; padding: 40px 24px;
            gap: 16px;
        }
        .empty-paw {
            font-size: 4rem; line-height: 1;
            filter: drop-shadow(0 0 20px rgba(124,92,252,.5));
            animation: waggle 3s ease-in-out infinite;
        }
        @keyframes waggle {
            0%,100% { transform: rotate(-8deg) scale(1); }
            50%      { transform: rotate(8deg) scale(1.08); }
        }
        .empty-title {
            font-family: var(--font-head); font-size: 1.4rem;
            font-weight: 700; color: var(--text);
        }
        .empty-sub { color: var(--text-muted); font-size: 0.88rem; max-width: 320px; line-height: 1.6; }

        /* ── CLEAR CHAT ── */
        #confirm-clear {
            display: none; position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,.55); backdrop-filter: blur(6px);
            align-items: center; justify-content: center;
        }
        #confirm-clear.show { display: flex; }
        .confirm-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 28px 32px; text-align: center;
            max-width: 320px; width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,.5);
        }
        .confirm-box p { color: var(--text-muted); margin: 10px 0 22px; font-size: 0.88rem; }
        .confirm-box h4 { font-family: var(--font-head); font-size: 1.1rem; color: var(--text); }
        .confirm-actions { display: flex; gap: 10px; justify-content: center; }
        .btn-confirm {
            padding: 9px 22px; border-radius: 20px; border: none;
            font-family: var(--font-body); font-size: 0.85rem;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-yes { background: linear-gradient(135deg, #fc5c5c, #ff8c69); color: #fff; }
        .btn-yes:hover { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(252,92,92,.4); }
        .btn-no  { background: var(--pill); border: 1px solid var(--border); color: var(--text-muted); }
        .btn-no:hover { border-color: var(--accent); color: var(--text); }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .header { padding: 14px 16px; }
            .messages { padding: 16px 12px 12px; }
            .quick-section { padding: 6px 12px; }
            .input-section { padding: 10px 12px 14px; }
            .bubble { max-width: 84%; font-size: 0.875rem; }
        }
    </style>
</head>
<body>

    <!-- Animated BG -->
    <div class="bg-canvas">
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
        <div class="paw-float" style="left:8%; animation-duration:22s; animation-delay:0s;">🐾</div>
        <div class="paw-float" style="left:25%; animation-duration:28s; animation-delay:-8s;">🐾</div>
        <div class="paw-float" style="left:55%; animation-duration:18s; animation-delay:-4s;">🐾</div>
        <div class="paw-float" style="left:78%; animation-duration:24s; animation-delay:-14s;">🐾</div>
    </div>

    <!-- Main App -->
    <div class="app">

        <!-- Header -->
        <div class="header">
            <a href="/" class="back-btn" title="Back to PetNova">← Home</a>
            <div class="avatar-wrap">
                <div class="avatar">🐾</div>
                <div class="status-dot"></div>
            </div>
            <div class="header-info">
                <div class="header-name">PawBot</div>
                <div class="header-sub">🟢 Online · PetNova AI</div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="clear-btn" title="Clear chat">🗑️</button>
            </div>
        </div>

        <!-- Messages -->
        <div class="messages" id="messages">
            <div class="empty-state" id="empty-state">
                <div class="empty-paw">🐾</div>
                <div class="empty-title">Hey there, pet lover!</div>
                <div class="empty-sub">I'm PawBot, your PetNova assistant. Ask me anything about pets, or tap a quick reply below!</div>
            </div>
        </div>

        <!-- Quick replies -->
        <div class="quick-section" id="quick-section">
            <button class="quick-btn">🐶 Find a dog</button>
            <button class="quick-btn">🐱 Find a cat</button>
            <button class="quick-btn">🏠 Rescue a pet</button>
            <button class="quick-btn">🏥 Find a vet</button>
            <button class="quick-btn">🧩 Take a quiz</button>
            <button class="quick-btn">💕 Find a mate</button>
            <button class="quick-btn">🛒 Buy a pet</button>
            <button class="quick-btn">🩺 Care tips</button>
        </div>

        <!-- Input -->
        <div class="input-section">
            <div class="input-wrap">
                <textarea id="chat-input" rows="1" placeholder="Ask PawBot anything… 🐾"></textarea>
                <button id="send-btn" aria-label="Send">➤</button>
            </div>
            <div class="input-footer">Powered by <span>Groq LLaMA</span> · PetNova</div>
        </div>
    </div>

    <!-- Confirm clear dialog -->
    <div id="confirm-clear">
        <div class="confirm-box">
            <h4>Clear conversation?</h4>
            <p>All messages will be permanently deleted from this session.</p>
            <div class="confirm-actions">
                <button class="btn-confirm btn-yes" id="confirm-yes">Yes, clear</button>
                <button class="btn-confirm btn-no"  id="confirm-no">Cancel</button>
            </div>
        </div>
    </div>

<script>
(function () {

    // ── DOM ──
    const messagesEl   = document.getElementById('messages');
    const emptyState   = document.getElementById('empty-state');
    const inputEl      = document.getElementById('chat-input');
    const sendBtn      = document.getElementById('send-btn');
    const quickSection = document.getElementById('quick-section');
    const clearBtn     = document.getElementById('clear-btn');
    const confirmDlg   = document.getElementById('confirm-clear');
    const confirmYes   = document.getElementById('confirm-yes');
    const confirmNo    = document.getElementById('confirm-no');

    // ── STATE ──
    let history = [];
    let waiting = false;

    // ── HELPERS ──
    function getTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function markdownLight(text) {
        return text
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g,     '<em>$1</em>')
            .replace(/`(.*?)`/g,       '<code style="background:rgba(124,92,252,.15);padding:1px 5px;border-radius:4px;font-size:.85em;">$1</code>')
            .replace(/\n/g, '<br>');
    }

    function hideEmpty() {
        if (emptyState) emptyState.style.display = 'none';
    }

    function scrollBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // ── APPEND MESSAGE ──
    function appendMsg(role, text) {
        hideEmpty();

        const row = document.createElement('div');
        row.className = 'msg-row ' + role;

        const avatarEl = document.createElement('div');
        avatarEl.className = 'msg-avatar';
        avatarEl.textContent = role === 'bot' ? '🐾' : '🧑';

        const col = document.createElement('div');
        col.className = 'msg-col';

        const bubble = document.createElement('div');
        bubble.className = 'bubble ' + role;
        bubble.innerHTML = markdownLight(text);

        const timeEl = document.createElement('div');
        timeEl.className = 'msg-time';
        timeEl.textContent = getTime();

        col.appendChild(bubble);
        col.appendChild(timeEl);

        row.appendChild(avatarEl);
        row.appendChild(col);
        messagesEl.appendChild(row);
        scrollBottom();
        return row;
    }

    // ── TYPING INDICATOR ──
    function showTyping() {
        const row = document.createElement('div');
        row.className = 'typing-row'; row.id = 'typing-row';

        const av = document.createElement('div');
        av.className = 'msg-avatar'; av.textContent = '🐾';

        const bub = document.createElement('div');
        bub.className = 'typing-bubble';
        bub.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

        row.appendChild(av);
        row.appendChild(bub);
        messagesEl.appendChild(row);
        scrollBottom();
    }

    function hideTyping() {
        const el = document.getElementById('typing-row');
        if (el) el.remove();
    }

    // ── SEND MESSAGE ──
    async function sendMessage(text) {
        text = text.trim();
        if (!text || waiting) return;

        quickSection.style.display = 'none';
        appendMsg('user', text);
        history.push({ role: 'user', content: text });
        inputEl.value = '';
        inputEl.style.height = 'auto';

        waiting = true;
        sendBtn.disabled = true;
        showTyping();

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: history })
            });
            const data = await res.json();
            hideTyping();
            const reply = data.reply || "Sorry, something went wrong 🐾";
            appendMsg('bot', reply);
            history.push({ role: 'assistant', content: reply });
        } catch (err) {
            hideTyping();
            appendMsg('bot', "Oops! Can't reach the server right now. Please try again 🐾");
        }

        waiting = false;
        sendBtn.disabled = false;
        inputEl.focus();
    }

    // ── QUICK BUTTONS ──
    document.querySelectorAll('.quick-btn').forEach(btn => {
        btn.addEventListener('click', () => sendMessage(btn.textContent.trim()));
    });

    // ── SEND ──
    sendBtn.addEventListener('click', () => sendMessage(inputEl.value));
    inputEl.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(inputEl.value); }
    });
    inputEl.addEventListener('input', () => {
        inputEl.style.height = 'auto';
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // ── CLEAR CHAT ──
    clearBtn.addEventListener('click', () => confirmDlg.classList.add('show'));
    confirmNo.addEventListener('click',  () => confirmDlg.classList.remove('show'));
    confirmYes.addEventListener('click', () => {
        history = [];
        messagesEl.innerHTML = '';
        messagesEl.appendChild(emptyState);
        emptyState.style.display = 'flex';
        quickSection.style.display = 'flex';
        confirmDlg.classList.remove('show');
    });
    confirmDlg.addEventListener('click', e => {
        if (e.target === confirmDlg) confirmDlg.classList.remove('show');
    });

    // ── GREETING ──
    setTimeout(() => {
        appendMsg('bot',
            "Hi there! 🐾 I'm **PawBot**, your PetNova assistant!\n\n" +
            "I can help you find pets, explore services (buying, selling, rescue, vets, care tips & more), " +
            "or answer any pet-care questions. What can I help you with today?"
        );
    }, 600);

})();
</script>
</body>
</html>
